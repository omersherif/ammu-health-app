<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0F6E56" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ammu's App" />
<title>Ammu's Health App</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #f3f4f6; -webkit-tap-highlight-color: transparent; }
  #app { max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh; position: relative; overflow: hidden; background: #F8FFFE; }
  .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }
  .page { display: none; }
  .page.active { display: block; }
  .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .nav-active-green { border-top-color: #0F6E56 !important; }
  .nav-active-blue  { border-top-color: #185FA5 !important; }
  .nav-active-navy  { border-top-color: #1A1A3E !important; }
  .nav-active-amber { border-top-color: #854F0B !important; }
  .nav-active-gray  { border-top-color: #5F5E5A !important; }
  *::-webkit-scrollbar { display: none; }
  .fadein { animation: fi 0.3s ease; }
  @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <!-- ════════ SCREEN: LOGIN ════════ -->
  <div class="screen active" id="screen-login">
    <div class="scrollable" style="flex:1; padding: 32px 24px;">
      <div style="text-align:center; margin-bottom: 28px;">
        <div style="font-size: 56px; line-height:1;">🐘</div>
        <h1 style="font-size: 26px; font-weight: 800; color: #0F6E56; margin: 8px 0 4px;">Ammu's Health App</h1>
        <p style="font-size: 14px; color: #6B7280; font-weight: 600;">Who's using the app?</p>
      </div>
      <div id="login-buttons"></div>
    </div>
  </div>

  <!-- ════════ SCREEN: PIN ════════ -->
  <div class="screen" id="screen-pin">
    <div class="scrollable" style="flex:1; padding: 32px 24px; display:flex; flex-direction:column; align-items:center;">
      <div id="pin-avatar" style="width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:12px; background:#E1F5EE;">🦁</div>
      <div id="pin-title" style="font-size:20px; font-weight:800; color:#111827;">Ammu's PIN</div>
      <div style="font-size:12px; color:#9CA3AF; font-weight:600; margin-top:4px;">Enter your 4-digit PIN</div>

      <div style="display:flex; gap:14px; margin:24px 0;">
        <div class="pin-dot" id="pd-0" style="width:16px; height:16px; border-radius:50%; border:2px solid #D1D5DB; background:#fff;"></div>
        <div class="pin-dot" id="pd-1" style="width:16px; height:16px; border-radius:50%; border:2px solid #D1D5DB; background:#fff;"></div>
        <div class="pin-dot" id="pd-2" style="width:16px; height:16px; border-radius:50%; border:2px solid #D1D5DB; background:#fff;"></div>
        <div class="pin-dot" id="pd-3" style="width:16px; height:16px; border-radius:50%; border:2px solid #D1D5DB; background:#fff;"></div>
      </div>

      <div id="pin-error" style="color:#DC2626; font-size:13px; font-weight:700; min-height:20px; opacity:0; transition:opacity 0.2s;">Wrong PIN — try again</div>

      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:280px; width:100%; margin-top:12px;">
        <button onclick="pk('1')" class="pin-key">1</button>
        <button onclick="pk('2')" class="pin-key">2</button>
        <button onclick="pk('3')" class="pin-key">3</button>
        <button onclick="pk('4')" class="pin-key">4</button>
        <button onclick="pk('5')" class="pin-key">5</button>
        <button onclick="pk('6')" class="pin-key">6</button>
        <button onclick="pk('7')" class="pin-key">7</button>
        <button onclick="pk('8')" class="pin-key">8</button>
        <button onclick="pk('9')" class="pin-key">9</button>
        <div></div>
        <button onclick="pk('0')" class="pin-key">0</button>
        <button onclick="pdel()" class="pin-key" style="font-size:20px;">⌫</button>
      </div>

      <button onclick="goLogin()" style="margin-top:20px; background:none; border:none; color:#9CA3AF; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;">← Back to users</button>
    </div>
  </div>

  <!-- ════════ SCREEN: MAIN ════════ -->
  <div class="screen" id="screen-main">
    <!-- Header -->
    <div id="main-header" style="flex-shrink:0; padding:12px 16px 8px; display:flex; align-items:center; justify-content:space-between; background:#0F6E56;">
      <div>
        <div id="main-greeting" style="font-size:11px; color:rgba(255,255,255,0.75); font-weight:700;">Good morning,</div>
        <div id="main-name" style="font-size:19px; color:#fff; font-weight:800;">Ammu</div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="main-mascot" style="font-size:26px;">🦁</span>
        <button onclick="goLogin()" style="background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:12px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer; font-family:inherit;">Switch</button>
      </div>
    </div>

    <!-- Clocks -->
    <div id="clocks-bar" style="flex-shrink:0; display:flex; align-items:center; padding:6px 16px; background:#1A1A2E;">
      <div style="flex:1; text-align:center;">
        <div style="font-size:13px; line-height:1;">🇬🇧</div>
        <div style="font-size:9px; font-weight:800; color:#9FE1CB; text-transform:uppercase; letter-spacing:0.5px; margin-top:1px;">London</div>
        <div id="ck-lon" style="font-family:monospace; font-size:14px; font-weight:900; color:#fff; line-height:1.2;">--:--</div>
        <div id="ck-lon-ap" style="font-size:9px; font-weight:700; color:#9FE1CB;"></div>
      </div>
      <div style="width:1px; background:#3A3A5E; height:32px; margin:0 8px;"></div>
      <div style="flex:1; text-align:center;">
        <div style="font-size:13px; line-height:1;">🇦🇪</div>
        <div style="font-size:9px; font-weight:800; color:#FAC775; text-transform:uppercase; letter-spacing:0.5px; margin-top:1px;">Dubai</div>
        <div id="ck-dub" style="font-family:monospace; font-size:14px; font-weight:900; color:#fff; line-height:1.2;">--:--</div>
        <div id="ck-dub-ap" style="font-size:9px; font-weight:700; color:#FAC775;"></div>
      </div>
      <div style="width:1px; background:#3A3A5E; height:32px; margin:0 8px;"></div>
      <div style="flex:1; text-align:center;">
        <div style="font-size:13px; line-height:1;">🇮🇳</div>
        <div style="font-size:9px; font-weight:800; color:#ED93B1; text-transform:uppercase; letter-spacing:0.5px; margin-top:1px;">Palakkad</div>
        <div id="ck-pal" style="font-family:monospace; font-size:14px; font-weight:900; color:#fff; line-height:1.2;">--:--</div>
        <div id="ck-pal-ap" style="font-size:9px; font-weight:700; color:#ED93B1;"></div>
      </div>
    </div>

    <!-- Page content -->
    <div id="pages-container" class="scrollable" style="flex:1; background:#F8FFFE;"></div>

    <!-- Bottom nav -->
    <div id="bottom-nav" style="flex-shrink:0; display:flex; background:#fff; border-top:1px solid #E5E7EB;"></div>
  </div>

</div>

<style>
  .pin-key { padding:16px; border-radius:14px; border:1px solid #E5E7EB; background:#fff; font-size:22px; font-weight:700; cursor:pointer; font-family:inherit; color:#111827; }
  .pin-key:active { background:#F3F4F6; transform:scale(0.96); }
</style>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        // Check for updates every time the app opens
        reg.update();
        // When a new service worker takes over, reload once to get fresh content
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }).catch(function(){});
    });
  }
</script>
</body>
</html>
